<!DOCTYPE html>
<html lang="en">
<head>
    <title>CliniClarity | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            onAuthStateChanged,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "{{ firebase_api_key }}",
            authDomain: "{{ firebase_auth_domain }}",
            projectId: "{{ firebase_project_id }}"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // AUTH CLOAK LOGIC: Hide UI until verified
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Instantly redirect to app if logged in
                window.location.href = "/";
            } else {
                // Drop the cloak to show the login form
                document.getElementById('authCloak').classList.remove('hidden');
            }
        });

        window.handleAuth = async function(event, isSignUp) {
            event.preventDefault();
            if (!document.getElementById('termsCheckbox').checked) {
                alert("Please accept the Terms & Conditions and Privacy Policy to continue.");
                return;
            }
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (!email || !pass) {
                alert("Please enter both email and password.");
                return;
            }

            try {
                if (isSignUp) {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) {
                alert(error.message);
            }
        };

        window.handleGoogleLogin = async function() {
            if (!document.getElementById('termsCheckbox').checked) {
                alert("Please accept the Terms & Conditions and Privacy Policy to continue.");
                return;
            }
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                alert("Google Sign-In Failed: " + error.message);
            }
        };
    </script>
</head>
<body class="bg-[#F5F5F7] min-h-screen flex items-center justify-center p-6 font-sans">

    <div id="authCloak" class="hidden w-full max-w-sm">
        <div class="w-full bg-white rounded-[2.5rem] p-10 text-center shadow-lg">
            <h1 class="text-3xl font-bold mb-8">CliniClarity</h1>
            <form class="space-y-4" onsubmit="return false;">
                <input type="email" id="email" placeholder="Email" required class="w-full bg-[#F5F5F7] rounded-full py-3 px-5 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Password" required class="w-full bg-[#F5F5F7] rounded-full py-3 px-5 outline-none focus:ring-2 focus:ring-blue-500">

                <div class="flex items-start gap-2 text-left">
                    <input type="checkbox" id="termsCheckbox" class="mt-1 w-4 h-4 rounded border-gray-300 text-blue-500 focus:ring-blue-500">
                    <label for="termsCheckbox" class="text-sm text-gray-600 leading-relaxed">
                        I agree to the
                        <a href="/terms" class="text-blue-500 hover:underline" target="_blank">Terms & Conditions</a>
                        and
                        <a href="/privacy" class="text-blue-500 hover:underline" target="_blank">Privacy Policy</a>
                    </label>
                </div>

                <button onclick="handleAuth(event, false)" class="w-full bg-blue-500 text-white font-semibold py-3 rounded-full mt-4 hover:bg-blue-600 transition-colors">Log In</button>
                <button onclick="handleAuth(event, true)" class="w-full bg-transparent text-blue-500 font-semibold py-3 rounded-full border border-blue-500 mt-2 hover:bg-blue-50 transition-colors">Create Account</button>
            </form>
            <div class="my-6 flex items-center before:mt-0.5 before:flex-1 before:border-t before:border-gray-300 after:mt-0.5 after:flex-1 after:border-t after:border-gray-300">
                <p class="mx-4 mb-0 text-center font-semibold text-gray-500">OR</p>
            </div>

            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white text-gray-700 font-semibold py-3 px-4 rounded-full border border-gray-300 shadow-sm hover:bg-gray-50 transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <footer class="absolute bottom-6 w-full text-center text-[12px] text-gray-400">
        <div class="flex justify-center gap-4 mb-2">
            <a href="/privacy" class="hover:text-blue-500 transition-colors">Privacy Policy</a>
            <a href="/terms" class="hover:text-blue-500 transition-colors">Terms & Conditions</a>
        </div>
        <p>© 2026 CliniClarity. All rights reserved.</p>
    </footer>

</body>
</html>
