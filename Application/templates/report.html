<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliniClarity | Health Insights</title>

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        // Force the markdown parser to respect single line breaks, preventing walls of text
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    typography: (theme) => ({
                        DEFAULT: {
                            css: {
                                h1: { color: theme('colors.slate.900'), fontWeight: '900', borderBottom: '2px solid', borderColor: theme('colors.slate.100'), paddingBottom: '0.5rem' },
                                h2: { color: theme('colors.blue.600'), fontWeight: '800', marginTop: '2.5em' },
                                p: { fontSize: '1.125rem', lineHeight: '2' },
                                li: { backgroundColor: theme('colors.slate.50'), padding: '1.25rem', borderRadius: '1rem', borderLeft: '4px solid', borderColor: theme('colors.blue.500'), marginTop: '1rem', marginBottom: '1rem', boxShadow: '0 1px 2px 0 rgb(0 0 0 / 0.05)' },
                                strong: { color: theme('colors.blue.800'), backgroundColor: theme('colors.blue.50'), padding: '0.2rem 0.5rem', borderRadius: '0.5rem' }
                            }
                        },
                        invert: {
                            css: {
                                h1: { color: theme('colors.white'), borderColor: theme('colors.slate.800') },
                                h2: { color: theme('colors.blue.400') },
                                p: { color: theme('colors.slate.300') },
                                li: { backgroundColor: 'rgba(30, 41, 59, 0.5)', borderColor: theme('colors.blue.500'), color: theme('colors.slate.200') },
                                strong: { color: theme('colors.blue.300'), backgroundColor: 'rgba(30, 58, 138, 0.4)' }
                            }
                        }
                    })
                }
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        @keyframes subtlePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: subtlePulse 3s infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 min-h-screen p-4 md:p-10 font-['Inter']">

    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-4 rounded-2xl bg-white dark:bg-slate-900 shadow-xl border border-slate-200 dark:border-slate-800 text-2xl transition-transform hover:scale-110 z-50">🌓</button>

    <div class="max-w-4xl mx-auto space-y-12 mt-8">

        <div class="flex items-center gap-4 mb-8">
             <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-2xl text-3xl flex items-center justify-center">🩺</div>
             <h1 class="text-3xl md:text-4xl font-900 text-slate-900 dark:text-white tracking-tight">CliniClarity Report</h1>
        </div>

        <article class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white dark:border-slate-800 p-8 md:p-14 transition-all overflow-hidden">

            <div class="flex items-center gap-3 mb-10 p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl border border-emerald-100 dark:border-emerald-900/30 w-fit">
                <div class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse-slow"></div>
                <p class="text-emerald-700 dark:text-emerald-400 text-sm font-bold uppercase tracking-widest">Grounding: Record Verified</p>
            </div>

            <div class="prose prose-lg prose-slate dark:prose-invert max-w-none">
                {{ summary_html | safe }}
            </div>

            <footer class="mt-16 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-between text-xs text-slate-400 font-bold uppercase tracking-widest">
                <span>Chunks: {{ chunks }}</span>
                <span>PHI Redacted</span>
            </footer>
        </article>

        <section class="bg-slate-900 dark:bg-black rounded-[2.5rem] p-8 md:p-14 text-white shadow-2xl border border-slate-800">
            <header class="mb-12">
                <h3 class="text-3xl font-bold flex items-center gap-4">
                    <span class="bg-blue-600 p-3 rounded-2xl text-2xl shadow-lg shadow-blue-500/30">🔍</span>
                    Medical Assistant
                </h3>
                <p class="text-slate-400 mt-4 text-lg">Ask follow-up questions about labs, definitions, or search clinical trials.</p>
            </header>

            <div class="relative mb-12 group">
                <input type="text" id="userQuestion"
                       class="w-full bg-slate-800 border-2 border-slate-700 rounded-3xl p-6 md:p-8 pr-40 md:pr-48 text-xl text-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all placeholder-slate-500 shadow-inner"
                       placeholder="Explain 'spiculated' with an analogy...">
                <button onclick="askAgent()" id="askBtn"
                        class="absolute right-3 top-3 bottom-3 bg-blue-600 hover:bg-blue-500 text-white px-8 md:px-12 rounded-2xl text-lg font-bold transition-all shadow-lg shadow-blue-500/20 active:scale-95 flex items-center gap-2">
                    Ask AI
                </button>
            </div>

            <div id="answerBox" class="hidden space-y-8 animate-in fade-in duration-500">
                <div class="bg-slate-800/80 rounded-3xl p-8 md:p-12 border border-slate-700/50 shadow-xl">
                    <div id="responseText" class="prose prose-lg prose-invert max-w-none prose-p:leading-[2.2] prose-p:mb-8 prose-strong:text-blue-300 prose-strong:bg-blue-900/40 prose-strong:px-2 prose-strong:py-1 prose-strong:rounded-md tracking-wide"></div>
                </div>

                <div id="sourceBox" class="hidden pt-6 border-t border-slate-800 text-center">
                    <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-6">Evidence-Based Research</p>
                    <div id="sourceContainer" class="flex flex-wrap justify-center gap-4"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        const currentModelSelection = "{{ llm_selection }}";

        async function askAgent() {
            const question = document.getElementById('userQuestion').value;
            const btn = document.getElementById('askBtn');
            const box = document.getElementById('answerBox');
            const text = document.getElementById('responseText');
            const sBox = document.getElementById('sourceBox'); // We will hide this since sources are now in the text

            if (!question) return;

            btn.disabled = true;
            btn.innerText = "Researching...";
            box.classList.remove('hidden');
            if (sBox) sBox.classList.add('hidden');

            text.innerHTML = `
                <div class="flex gap-3 p-4">
                    <div class="w-4 h-4 bg-blue-500 rounded-full animate-bounce"></div>
                    <div class="w-4 h-4 bg-blue-500 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                    <div class="w-4 h-4 bg-blue-500 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                </div>`;

            try {
                const response = await fetch('/question/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: question,
                        llm_selection: currentModelSelection
                    })
                });

                // Read the stream instead of expecting a JSON file
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = "";
                text.innerHTML = ""; // Clear the loading dots

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    accumulatedText += chunk;

                    // Parse markdown on the fly so bullet points and bold text look nice
                    text.innerHTML = marked.parse(accumulatedText);
                }
            } catch (e) {
                text.innerHTML = "<p>Error contacting the clinical assistant. Please check your connection.</p>";
            } finally {
                btn.disabled = false;
                btn.innerText = "Ask AI";
            }
        }
    </script>
</body>
</html>
