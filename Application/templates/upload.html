<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliniClarity | Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
    /* Custom styles for the workflow nodes */
    .workflow-node { transition: all 0.5s ease; }
    .node-active {
        background-color: #f3e8ff; border-color: #a855f7;
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        transform: scale(1.05);
    }
    .dark .node-active { background-color: #581c87; border-color: #c084fc; }
    .node-completed { background-color: #f8fafc; border-color: #cbd5e1; color: #94a3b8; }
    .dark .node-completed { background-color: #0f172a; border-color: #334155; color: #475569; }

    /* New Flowing Arrow Connectors */
    .edge-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40px; transition: all 0.5s ease; }
    .edge-line { width: 4px; height: 100%; background-color: #cbd5e1; position: relative; overflow: hidden; border-radius: 4px; transition: background-color 0.5s ease; }
    .dark .edge-line { background-color: #475569; }
    .edge-arrow { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid #cbd5e1; margin-top: -2px; transition: border-top-color 0.5s ease; }
    .dark .edge-arrow { border-top-color: #475569; }

    /* The glowing particle animation */
    @keyframes flowDown {
        0% { transform: translateY(-100%); opacity: 0;}
        50% { opacity: 1; }
        100% { transform: translateY(100%); opacity: 0;}
    }

    .edge-active .edge-line { background-color: #e9d5ff; }
    .dark .edge-active .edge-line { background-color: #4c1d95; }
    .edge-active .edge-arrow { border-top-color: #a855f7; }
    .dark .edge-active .edge-arrow { border-top-color: #c084fc; }
    .edge-active .edge-line::after {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, transparent, #a855f7, transparent);
        animation: flowDown 1.2s linear infinite;
    }

    .edge-completed .edge-line { background-color: #a855f7; }
    .dark .edge-completed .edge-line { background-color: #9333ea; }
    .edge-completed .edge-arrow { border-top-color: #a855f7; }
    .dark .edge-completed .edge-arrow { border-top-color: #9333ea; }
</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 min-h-screen flex items-center justify-center p-6 font-['Inter']">
    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-3 rounded-2xl bg-white dark:bg-slate-900 shadow-xl border border-slate-200 dark:border-slate-800 text-xl transition-transform hover:scale-110 z-50">🌓</button>

    <div class="max-w-md w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white dark:border-slate-800 p-10 text-center transition-all">

        <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-blue-50 dark:bg-blue-900/30 rounded-3xl text-4xl shadow-sm">🩺</div>
        <h1 class="text-3xl font-800 text-slate-900 dark:text-white mb-2 tracking-tight">CliniClarity</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">Turn complex medical reports into clear health insights.</p>

        <div id="formContainer">
            <form action="/summary/" method="post" enctype="multipart/form-data" id="uploadForm">
                <label class="group relative block cursor-pointer mb-6">
                    <div class="border-2 border-dashed border-slate-200 dark:border-slate-700 group-hover:border-blue-500 rounded-3xl p-10 transition-all bg-slate-50/50 dark:bg-slate-800/30 group-hover:bg-blue-50/30">
                        <input type="file" name="file" id="fileInput" accept=".pdf" required class="hidden" onchange="updateFileInfo()">
                        <div id="uploadContent">
                            <div class="text-blue-500 mb-3 flex justify-center">
                                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                            </div>
                            <span class="text-slate-900 dark:text-white font-600 block">Select PDF Report</span>
                        </div>
                        <div id="fileSelected" class="hidden text-left bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-blue-100 dark:border-blue-900">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">📄</span>
                                <p id="fileName" class="text-sm font-bold text-slate-900 dark:text-white truncate">document.pdf</p>
                            </div>
                        </div>
                    </div>
                </label>

                <div class="mb-8 text-left">
                    <label class="block text-slate-700 dark:text-slate-300 font-bold mb-3 text-sm ml-2">Select Intelligence Engine</label>
                    <select name="llm_selection" id="modelSelect" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-slate-900 dark:text-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all cursor-pointer font-semibold shadow-inner appearance-none">
                        <optgroup label="Standard Models (Built-in)">
                            <option value="google_genai|gemini-3-flash-preview" selected>Gemini 3 Flash (Fast & Default)</option>
                            <option value="google_genai|gemini-3-pro-preview">Gemini 3 Pro (Advanced)</option>
                            <option value="openai|gpt-4o">OpenAI GPT-4o</option>
                            <option value="anthropic|claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                        </optgroup>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                    Analyze My Report
                </button>
            </form>
        </div>

    <div id="loadingScreen" class="hidden flex-col items-center justify-center py-4 w-full">
        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-8">Processing Pipeline</h3>

        <div class="flex flex-col items-center w-full relative">
            <div id="node-start" class="workflow-node node-completed w-32 py-2 rounded-full border-2 border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-semibold text-sm z-10 text-center shadow-sm">__start__</div>

            <div id="edge-start-load" class="edge-container -my-1"><div class="edge-line"></div><div class="edge-arrow"></div></div>

            <div id="node-load" class="workflow-node w-40 py-3 rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold z-10 text-center shadow-md">Extract Text</div>

            <div id="edge-load-redact" class="edge-container -my-1"><div class="edge-line"></div><div class="edge-arrow"></div></div>

            <div id="node-redact" class="workflow-node w-40 py-3 rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold z-10 text-center shadow-md">Anonymize PII</div>

            <div id="edge-redact-ingestion" class="edge-container -my-1"><div class="edge-line"></div><div class="edge-arrow"></div></div>

            <div id="node-ingestion" class="workflow-node w-40 py-3 rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold z-10 text-center shadow-md">Vectorize Data</div>

            <div id="edge-ingestion-summarize" class="edge-container -my-1"><div class="edge-line"></div><div class="edge-arrow"></div></div>

            <div id="node-summarize" class="workflow-node w-40 py-3 rounded-xl border-2 border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold z-10 text-center shadow-md">Generate Summary</div>

            <div id="edge-summarize-end" class="edge-container -my-1"><div class="edge-line"></div><div class="edge-arrow"></div></div>

            <div id="node-end" class="workflow-node w-32 py-2 rounded-full border-2 border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-semibold text-sm z-10 text-center shadow-sm">__end__</div>
        </div>
    </div>

    </div>

<script>
        // 1. Theme Logic
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        // 2. File Upload UI Update
        function updateFileInfo() {
            const input = document.getElementById('fileInput');
            if (input.files.length > 0) {
                document.getElementById('uploadContent').classList.add('hidden');
                document.getElementById('fileSelected').classList.remove('hidden');
                document.getElementById('fileName').innerText = input.files[0].name;
            }
        }

        // 3. Dynamic Market API Fetch (OpenRouter)
        async function fetchMarketModels() {
            try {
                const response = await fetch('https://openrouter.ai/api/v1/models');
                const data = await response.json();
                const select = document.getElementById('modelSelect');

                const optGroup = document.createElement('optgroup');
                optGroup.label = "Market Models (via OpenRouter)";

                const topModels = data.data.filter(model =>
                    model.id.includes("llama") ||
                    model.id.includes("mistral") ||
                    model.id.includes("deepseek")
                ).slice(0, 10);

                topModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = `openai|${model.id}`;
                    option.textContent = model.name;
                    optGroup.appendChild(option);
                });

                select.appendChild(optGroup);
            } catch (error) {
                console.error("Could not load market models:", error);
            }
        }

        fetchMarketModels();

// Unified state manager for both Nodes and Edges
        function setItemState(id, state) {
            const item = document.getElementById(id);
            if (!item) return;

            // Clear previous states
            item.classList.remove('node-active', 'node-completed', 'edge-active', 'edge-completed');

            // Apply new state
            if (state) {
                item.classList.add(id.includes('node') ? `node-${state}` : `edge-${state}`);
            }
        }

        // Connect the submission to the backend stream
        document.getElementById('uploadForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;

            // Switch UI to Loading Graph
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('loadingScreen').classList.remove('hidden');
            document.getElementById('loadingScreen').classList.add('flex');

            // Define the sequence matching your LangGraph architecture
            const nodeSequence = ['start', 'load', 'redact', 'ingestion', 'summarize', 'end'];
            const minDelay = 1500; // Minimum 1.5 seconds per node for UI pacing
            let lastUpdateTime = Date.now();

            // Initialize the first step animation
            setItemState('edge-start-load', 'active');
            setItemState('node-load', 'active');

            try {
                const formData = new FormData(this);
                const response = await fetch('/summary/', {
                    method: 'POST',
                    body: formData
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                // Read the stream chunk by chunk
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop(); // Keep incomplete chunks in buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.replace(/^data: /, ''));

                            if (data.type === 'status') {
                                const finishedNode = data.step;

                                // ARTIFICIAL DELAY: Hold the UI if the backend was too fast
                                const elapsed = Date.now() - lastUpdateTime;
                                if (elapsed < minDelay) {
                                    await new Promise(r => setTimeout(r, minDelay - elapsed));
                                }

                                // 1. Mark the current node as completed
                                setItemState(`node-${finishedNode}`, 'completed');

                                // 2. Find the next node to activate in the chain
                                const nextIndex = nodeSequence.indexOf(finishedNode) + 1;
                                if (nextIndex < nodeSequence.length) {
                                    const nextNode = nodeSequence[nextIndex];

                                    // Make the edge above solid
                                    setItemState(`edge-${finishedNode}-${nextNode}`, 'completed');

                                    if (nextNode !== 'end') {
                                        // Highlight the next node
                                        setItemState(`node-${nextNode}`, 'active');

                                        // Start flowing the edge below it
                                        const edgeBelow = nodeSequence[nextIndex + 1];
                                        if(edgeBelow) {
                                            setItemState(`edge-${nextNode}-${edgeBelow}`, 'active');
                                        }
                                    }
                                }
                                lastUpdateTime = Date.now();

                            } else if (data.type === 'complete') {
                                // Give the final step a moment before flashing the new page
                                const elapsed = Date.now() - lastUpdateTime;
                                if (elapsed < 1000) await new Promise(r => setTimeout(r, 1000 - elapsed));

                                document.open();
                                document.write(data.html);
                                document.close();

                            } else if (data.type === 'error') {
                                alert("Processing Error: " + data.message);
                                submitBtn.disabled = false;
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("Stream Error:", error);
                alert("A connection error occurred while processing the report.");
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
