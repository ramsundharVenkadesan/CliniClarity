name: Destroy Infrastructure

# This line means it can ONLY be triggered manually via the GitHub UI
on: workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # JOB 1: Plan the Destruction
  # ==========================================
  terraform-plan-destroy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Infrastructure

    # Injecting secrets so Terraform can initialize correctly
    env:
      TF_VAR_google_api_key: ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_pinecone_api_key: ${{ secrets.PINECONE_API_KEY }}
      TF_VAR_hugging_face_token: ${{ secrets.HUGGINGFACE_TOKEN }}
      TF_VAR_langchain_api_key: ${{ secrets.LANGCHAIN_API_KEY }}
      TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan Destroy
        # The -destroy flag tells Terraform to plan a teardown rather than an update
        run: terraform plan -destroy -input=false

  # ==========================================
  # JOB 2: Await Approval and Execute Teardown
  # ==========================================
  terraform-apply-destroy:
    needs: terraform-plan-destroy
    environment: production # Forces the manual approval pause!
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Infrastructure

    env:
      TF_VAR_google_api_key: ${{ secrets.GOOGLE_API_KEY }}
      TF_VAR_pinecone_api_key: ${{ secrets.PINECONE_API_KEY }}
      TF_VAR_hugging_face_token: ${{ secrets.HUGGINGFACE_TOKEN }}
      TF_VAR_langchain_api_key: ${{ secrets.LANGCHAIN_API_KEY }}
      TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
